name: Deploy Pharma web

on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Needed for future federated identity
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          # Optional: version: latest
          # ping: ${{ secrets.SERVER_HOST }}   # Forces connection wait

      - name: Verify Tailscale Connectivity
        run: |
          tailscale status
          tailscale ping ${{ secrets.SERVER_HOST }} || true
          nc -zv ${{ secrets.SERVER_HOST }} 22 || true
          echo "Tailscale debug:"
          tailscale debug prefs || true

      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
      
          # Write private key to file
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
      
          # Optional: add known_hosts to avoid StrictHostKeyChecking prompt
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts || true
      
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_rsa \
              ubuntu@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /home/ubuntu/pharma_Web
            bash deploy.sh
          EOF
